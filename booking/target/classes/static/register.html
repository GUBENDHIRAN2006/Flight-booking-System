<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Deccan Airways</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <span>✈</span> Deccan Airways
        </a>
        <ul class="nav-links">
            <li>
                <button id="themeToggle" class="theme-toggle-btn" title="Toggle Theme">🌓</button>
            </li>
            <li><a href="login.html">Log In</a></li>
        </ul>
    </nav>

    <div class="auth-wrapper">
        <div class="card auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p style="margin-top: 0.5rem;">Join Deccan Airways and start booking your flights</p>
            </div>

            <div id="alertContainer"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <script>
        // Theme initialization
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });

        const form = document.getElementById('registerForm');
        const alertContainer = document.getElementById('alertContainer');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertContainer.innerHTML = '';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alertContainer.innerHTML = `<div class="alert alert-success">Registration successful! Redirecting to login...</div>`;
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-danger">${result.message || 'Registration failed'}</div>`;
                }
            } catch (err) {
                alertContainer.innerHTML = `<div class="alert alert-danger">Network error. Please try again.</div>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
