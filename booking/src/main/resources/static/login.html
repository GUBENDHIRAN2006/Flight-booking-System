<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Deccan Airways</title>
    <meta name="description" content="Log in to your Deccan Airways account to book flights and manage bookings.">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background: var(--bg-primary);
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .auth-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.4rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }

        /* Divider */
        .divider-or {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.25rem 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .divider-or::before, .divider-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* Custom Google Button */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--border-color);
            border-radius: 0.625rem;
            background: var(--bg-card);
            color: var(--text-primary);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-google:hover {
            border-color: #4285f4;
            background: rgba(66, 133, 244, 0.06);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(66,133,244,0.18);
        }
        .btn-google:active {
            transform: translateY(0);
        }
        .google-svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        .google-note {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* Google One Tap container (hidden by default, SDK controls it) */
        #g_id_onload { display: none; }

        /* Alert override for Google setup message */
        .alert-google-setup {
            background: rgba(66,133,244,0.07);
            border: 1px solid rgba(66,133,244,0.2);
            border-radius: 0.625rem;
            padding: 0.9rem 1rem;
            font-size: 0.85rem;
            color: var(--text-primary);
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
            flex-direction: column;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <span>✈</span> Deccan Airways
        </a>
        <ul class="nav-links">
            <li>
                <button id="themeToggle" class="theme-toggle-btn" title="Toggle Theme">🌓</button>
            </li>
            <li><a href="register.html">Sign Up</a></li>
        </ul>
    </nav>

    <!-- Google Identity One Tap (auto-loads if valid client_id is set) -->
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleGoogleCredential"
         data-auto_prompt="false">
    </div>

    <div class="auth-wrapper">
        <div class="card auth-card">
            <div class="auth-header">
                <h1>Welcome Back ✈</h1>
                <p>Access your Deccan Airways account</p>
            </div>

            <div id="alertContainer"></div>

            <!-- Google Sign-In Button -->
            <button class="btn-google" id="googleSignInBtn" onclick="handleGoogleSignIn()">
                <!-- Official Google "G" logo colours -->
                <svg class="google-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
            <p class="google-note">Sign in instantly with your Google account</p>

            <div class="divider-or"><span>or sign in with email</span></div>

            <!-- Email / Password form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@domain.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.85rem;">Log In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Load Google GSI script last (not async/defer) so it is available synchronously -->
    <script>
        // Theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        const alertContainer = document.getElementById('alertContainer');

        // ──────────────────────────────────────────────
        //  Email / Password Login
        // ──────────────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alertContainer.innerHTML = '';
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();

                if (response.ok && result.success) {
                    alertContainer.innerHTML = `<div class="alert alert-success">✅ Login successful! Redirecting...</div>`;
                    const userRole  = result.data.role;
                    const userEmail = result.data.email;
                    setTimeout(() => {
                        if (userRole === 'ADMIN' || userEmail === 'admin@gmail.com') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'home.html';
                        }
                    }, 900);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-danger">❌ ${result.message || 'Invalid email or password.'}</div>`;
                }
            } catch (err) {
                alertContainer.innerHTML = `<div class="alert alert-danger">❌ Network error. Please try again.</div>`;
            }
        });

        // ──────────────────────────────────────────────
        //  Google Sign-In
        // ──────────────────────────────────────────────
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
        const googleConfigured  = !GOOGLE_CLIENT_ID.includes('YOUR_GOOGLE_CLIENT_ID');

        function handleGoogleSignIn() {
            alertContainer.innerHTML = '';

            if (!googleConfigured) {
                // Show a friendly setup notice — never redirect or crash
                alertContainer.innerHTML = `
                    <div class="alert-google-setup">
                        <strong>⚙️ Google Sign-In — Setup Required</strong>
                        <span>To enable Google login, a Google OAuth Client ID must be configured in the application. Please use <strong>email & password</strong> to sign in for now.</span>
                        <span style="font-size:0.8rem;color:var(--text-secondary);">Admin: replace <code>GOOGLE_CLIENT_ID</code> in login.html with your OAuth 2.0 Client ID from <a href="https://console.cloud.google.com/" target="_blank" style="color:var(--accent);">Google Cloud Console</a>.</span>
                    </div>`;
                return;
            }

            // If GSI library is loaded, trigger prompt
            if (window.google && google.accounts) {
                google.accounts.id.prompt((notification) => {
                    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                        // One Tap blocked — show the pre-rendered button instead
                        document.getElementById('gsiButtonWrapper').style.display = 'flex';
                    }
                });
            } else {
                alertContainer.innerHTML = `<div class="alert alert-warning">⏳ Google Sign-In is loading. Please try again in a moment.</div>`;
            }
        }

        // Callback from Google Identity Services
        async function handleGoogleCredential(response) {
            if (!response || !response.credential) {
                alertContainer.innerHTML = '<div class="alert alert-danger">❌ Google sign-in failed. Please try again.</div>';
                return;
            }
            alertContainer.innerHTML = '<div class="alert alert-warning">⏳ Verifying Google account...</div>';

            // Decode JWT payload (for display only — backend must verify signature)
            let userInfo = {};
            try {
                const b64 = response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                userInfo = JSON.parse(atob(b64));
            } catch { /* ignore decode errors */ }

            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email:      userInfo.email  || '',
                        name:       userInfo.name   || '',
                        googleId:   userInfo.sub    || '',
                        credential: response.credential
                    })
                });

                if (res.ok) {
                    const result = await res.json();
                    if (result.success) {
                        const name = userInfo.given_name || userInfo.name || 'there';
                        alertContainer.innerHTML = `<div class="alert alert-success">✅ Welcome, ${name}! Redirecting...</div>`;
                        setTimeout(() => { window.location.href = 'home.html'; }, 900);
                        return;
                    }
                }
            } catch { /* fall through */ }

            // Backend doesn't support Google OAuth yet — show friendly hint
            alertContainer.innerHTML = `
                <div class="alert-google-setup">
                    <strong>👋 Hello, ${userInfo.name || ''}!</strong>
                    <span>Google Sign-In backend is not configured yet. Please <a href="register.html" style="color:var(--accent);font-weight:700;">create an account</a> using your Google email: <strong>${userInfo.email || ''}</strong>.</span>
                </div>`;
        }

        // Initialise GSI after page load (non-blocking)
        window.addEventListener('load', () => {
            if (!googleConfigured) return; // Don't load GSI if no Client ID
            const script = document.createElement('script');
            script.src = 'https://accounts.google.com/gsi/client';
            script.onload = () => {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback:  handleGoogleCredential,
                    ux_mode:   'popup'
                });
            };
            document.head.appendChild(script);
        });
    </script>
</body>
</html>
